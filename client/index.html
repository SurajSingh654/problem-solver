<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="ProbSolver — Team interview preparation intelligence platform with AI-powered coaching, 6D readiness tracking, and mock interviews" />

    <!-- Theme-aware browser chrome color -->
    <meta name="theme-color" content="#09090f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f8fc" media="(prefers-color-scheme: light)" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Font loading — non-blocking with preload + swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        media="print" onload="this.media='all'" />
    <!-- Fallback for browsers without JS -->
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    </noscript>

    <!-- Prevent flash of wrong theme — runs before any rendering -->
    <script>
        (function () {
            var theme = localStorage.getItem('ps_theme') || 'dark'
            var html = document.documentElement
            if (theme === 'light') {
                html.classList.remove('dark')
                html.classList.add('light')
            } else {
                html.classList.remove('light')
                html.classList.add('dark')
            }
        })()
    </script>

    <title>ProbSolver — Team Edition</title>

    <style>
        /* ── Docs navbar — only visible on /docs/* routes ── */
        #docs-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: var(--surface-1, #111118);
            border-bottom: 1px solid var(--border-default, rgba(255, 255, 255, 0.09));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 9999;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 12px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        #docs-navbar.hidden {
            display: none !important;
        }

        #docs-navbar-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #docs-navbar-left span {
            color: var(--text-disabled, rgba(255, 255, 255, 0.25));
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        #docs-navbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .docs-nav-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-tertiary, rgba(255, 255, 255, 0.45));
            text-decoration: none;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .docs-nav-link:hover {
            color: var(--text-primary, rgba(255, 255, 255, 0.9));
            background: var(--surface-3, rgba(255, 255, 255, 0.06));
            border-color: var(--border-default, rgba(255, 255, 255, 0.1));
        }

        .docs-nav-link.primary {
            color: #9d93f9;
            background: rgba(124, 111, 247, 0.1);
            border-color: rgba(124, 111, 247, 0.2);
        }

        .docs-nav-link.primary:hover {
            color: #c4beff;
            background: rgba(124, 111, 247, 0.18);
            border-color: rgba(124, 111, 247, 0.35);
        }

        .docs-nav-divider {
            width: 1px;
            height: 14px;
            background: var(--border-default, rgba(255, 255, 255, 0.1));
            margin: 0 4px;
        }

        .docs-nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
            animation: docs-pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        .docs-nav-badge {
            display: inline-flex;
            align-items: center;
            padding: 1px 6px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            letter-spacing: 0.04em;
        }

        @keyframes docs-pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        /* Responsive docs navbar */
        @media (max-width: 640px) {
            .docs-nav-label {
                display: none;
            }

            #docs-navbar-left span {
                display: none;
            }

            .docs-nav-link {
                padding: 4px 8px;
            }
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .docs-nav-dot {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <!-- Docs navbar — hidden on non-docs pages by JS -->
    <div id="docs-navbar">
        <div id="docs-navbar-left">
            <div class="docs-nav-dot"></div>
            <span>ProbSolver v2.0</span>
            <div class="docs-nav-badge">LIVE</div>
        </div>
        <div id="docs-navbar-right">
            <a class="docs-nav-link" href="/docs/deploy" title="Deploy Guide">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                </svg>
                <span class="docs-nav-label">Deploy</span>
            </a>
            <div class="docs-nav-divider"></div>
            <a class="docs-nav-link" href="/docs/setup" title="Setup Guide">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                </svg>
                <span class="docs-nav-label">Setup</span>
            </a>
            <a class="docs-nav-link primary" href="/docs/readme" title="README">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                <span class="docs-nav-label">README</span>
            </a>
        </div>
    </div>

    <!-- React app mounts here -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
        // ── Docs navbar visibility ──────────────────────
        // Only show on /docs/* routes, hide on all app pages
        function updateDocsNavbar() {
            var navbar = document.getElementById('docs-navbar')
            if (!navbar) return
            var isDocsPage = window.location.pathname.startsWith('/docs/')
            navbar.classList.toggle('hidden', !isDocsPage)
        }

        // Run on load
        updateDocsNavbar()

        // Watch for React Router navigation
        window.addEventListener('popstate', updateDocsNavbar)

        // Override pushState/replaceState to catch SPA navigations
        var _pushState = history.pushState.bind(history)
        var _replaceState = history.replaceState.bind(history)

        history.pushState = function () {
            _pushState.apply(this, arguments)
            updateDocsNavbar()
        }
        history.replaceState = function () {
            _replaceState.apply(this, arguments)
            updateDocsNavbar()
        }
    </script>
</body>

</html>
